services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hobbiz_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hobbiz_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
