services:
  mongodb:
    image: mongo:7
    container_name: hobbiz_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hobbiz_db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hobbiz_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      NODE_ENV: development
      PORT: 5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hobbiz_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
