# Reverse proxy Nginx pentru backend-ul Hobbiz (Node/Express + Socket.IO)
# Copiaza in /etc/nginx/sites-available/api.hobbiz.ro pe droplet, inlocuieste
# DOMAIN cu domeniul real, apoi: ln -s in sites-enabled si nginx -t && systemctl reload nginx
# (certbot va completa automat blocul SSL la rularea `certbot --nginx`)

server {
    listen 80;
    server_name DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # necesar pentru upgrade-ul conexiunii la WebSocket (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
